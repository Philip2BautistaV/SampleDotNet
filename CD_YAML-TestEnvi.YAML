
trigger: none

resources:
  pipelines:
    - pipeline: CI-Pipeline
      source: CI_YAML-TestEnvi   # Name of your CI pipeline
      trigger:
        branches:
          include:
            - Develop
            - main
            - release/*

variables:
  azureServiceConnection: '45138fee-3b39-4bda-bba3-d5461fad16ab'
  webAppName: 'Staging101'

stages:

# =========================
# STAGING (Develop Branch)
# =========================
- stage: Staging
  displayName: 'Deploy to Staging (DBG-Training)'
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/Develop')

  jobs:
    - deployment: Deploy_Staging
      displayName: 'Deploy to DBG-Training'
      environment: 'DBG-Training'
      strategy:
        runOnce:
          deploy:
            steps:
              - download: CI-Pipeline
                artifact: drop

              - task: AzureWebApp@1
                displayName: 'Deploy to Staging WebApp'
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  appName: $(webAppName)
                  package: $(Pipeline.Workspace)/CI-Pipeline/drop/**/*.zip


# =========================
# ORT (Release Branch)
# =========================
- stage: ORT
  displayName: 'Deploy to ORT-Environment'
  condition: startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')

  jobs:
    - deployment: Deploy_ORT
      displayName: 'Deploy to ORT'
      environment: 'ORT-Environment'
      strategy:
        runOnce:
          deploy:
            steps:
              - download: CI-Pipeline
                artifact: drop

              - task: AzureWebApp@1
                displayName: 'Deploy to ORT WebApp'
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  appName: $(webAppName)
                  package: $(Pipeline.Workspace)/CI-Pipeline/drop/**/*.zip


# =========================
# PRODUCTION (Main Branch)
# =========================
- stage: Production
  displayName: 'Deploy to Production (Staging101)'
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')

  jobs:
    - deployment: Deploy_Prod
      displayName: 'Deploy to Production'
      environment: 'Staging101'
      strategy:
        runOnce:
          deploy:
            steps:
              - download: CI-Pipeline
                artifact: drop

              - task: AzureWebApp@1
                displayName: 'Deploy to Production WebApp'
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  appName: $(webAppName)
                  package: $(Pipeline.Workspace)/CI-Pipeline/drop/**/*.zip
