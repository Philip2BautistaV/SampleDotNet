trigger: none
pr: none

resources:
  pipelines:
    - pipeline: ciPipeline   # alias (you can keep this)
      source: Philip2BautistaV.SampleDotNet-ACN   # ✅ MUST match your CI pipeline name
      trigger:
        branches:
          include:
            - Develop   # ✅ must match CI trigger branch exactly

pool:
  vmImage: windows-latest

stages:

# ===============================
# STAGE - DEPLOY TO DEVELOPMENT
# ===============================
- stage: Deploy_Dev
  displayName: "Deploy to Development"

  jobs:
    - deployment: DeployToDevelopment
      displayName: "Deploy to Development Environment"

      # ✅ This enables approval (configure in Azure DevOps UI)
      environment: "Staging101"

      strategy:
        runOnce:
          deploy:
            steps:

              # ✅ Download artifact from CI pipeline
              - download: ciPipeline
                artifact: drop

              # ✅ Verify artifact (debug step)
              - script: |
                  echo "Listing downloaded artifact:"
                  dir $(Pipeline.Workspace)/ciPipeline/drop
                displayName: "Verify Artifact"

              # ✅ Deployment step (replace with real deployment)
              - script: |
                  echo "Deploying application to Development environment..."
                displayName: "Deploy Application"
