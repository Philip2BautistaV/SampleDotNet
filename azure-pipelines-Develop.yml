
trigger: none
pr: none

resources:
  pipelines:
    - pipeline: ciPipeline   # alias
      source: Philip2BautistaV.SampleDotNet-ACN   # ✅ CI pipeline name
      trigger:
        branches:
          include:
            - Develop   # must match CI branch exactly

pool:
  vmImage: windows-latest

stages:

# ===============================
# STAGE - DEPLOY TO DEVELOPMENT
# ===============================
- stage: Deploy_Dev
  displayName: "Deploy to Development"

  jobs:
    - deployment: DeployToDevelopment
      displayName: "Deploy to Development Environment"

      # ✅ Approval happens here (configured in ADO UI)
      environment: "Development"

      strategy:
        runOnce:
          deploy:
            steps:

              - download: ciPipeline
                artifact: drop

              - script: |
                  echo "Artifact downloaded"
                  dir $(Pipeline.Workspace)
                displayName: "Verify Artifact"

              - script: |
                  echo "Deploying to Development..."
                displayName: "Deploy"
